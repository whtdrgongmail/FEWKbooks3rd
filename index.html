<html lang="ko">
<head>

<style>
/* ═══════════════════════════════════════════
   FEWK LOREBOOK 3rd — Dual Mode (Light/Dark)
   ═══════════════════════════════════════════ */

/* Light mode (default) — "백공" 모티프 */
:root {
  --bg: #F7F5F0;
  --bg-surface: #FFFFFF;
  --bg-elevated: #FDFBF6;
  --bg-hover: #F0ECE4;
  --text: #1F1F2E;
  --text-muted: #5A5663;
  --text-subtle: #8B8590;
  --border: #E0DCD2;
  --border-strong: #C4BFB2;
  --accent: #B91C3A;
  --accent-soft: rgba(185, 28, 58, 0.08);
  --accent-border: rgba(185, 28, 58, 0.25);
  --gold: #9A7B28;
  --gold-soft: rgba(154, 123, 40, 0.1);
  --code-bg: #F0ECE4;
  --blockquote-bg: rgba(154, 123, 40, 0.05);
}

/* Dark mode — "흑공" 모티프 */
html[data-theme="dark"] {
  --bg: #1A1A2E;
  --bg-surface: #16162B;
  --bg-elevated: #1F1F3A;
  --bg-hover: #252545;
  --text: #F0EDE8;
  --text-muted: #A09890;
  --text-subtle: #6B6558;
  --border: #2A2A4A;
  --border-strong: #3A3A5A;
  --accent: #E94560;
  --accent-soft: rgba(233, 69, 96, 0.1);
  --accent-border: rgba(233, 69, 96, 0.3);
  --gold: #C4A35A;
  --gold-soft: rgba(196, 163, 90, 0.1);
  --code-bg: #1F1F3A;
  --blockquote-bg: rgba(196, 163, 90, 0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; scroll-behavior:smooth; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
  min-height:100vh;
  transition: background-color .3s, color .3s;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* ── Sidebar ── */
.sidebar {
  width:280px;
  height:100vh;
  background:var(--bg-surface);
  border-right:1px solid var(--border);
  padding:1.5rem 0 2rem;
  position:fixed;
  top:0; left:0;
  overflow-y:auto;
  z-index:100;
  transition:transform .3s, background-color .3s, border-color .3s;
}
.sidebar-header {
  padding:0 1.2rem 1rem;
  border-bottom:1px solid var(--border);
  margin-bottom:.5rem;
}
.sidebar-title {
  font-family:'JetBrains Mono',monospace;
  font-size:1rem;
  font-weight:700;
  color:var(--accent);
  letter-spacing:.08em;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:.3rem;
}
.sidebar-title span.brackets { color:var(--gold); }
.sidebar-subtitle {
  font-size:.72rem;
  color:var(--text-subtle);
  font-family:'JetBrains Mono',monospace;
  margin-top:.25rem;
  letter-spacing:.05em;
}

/* Theme toggle */
.theme-toggle {
  display:flex;
  align-items:center;
  gap:.4rem;
  padding:.4rem .7rem;
  margin:.5rem 1rem;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:6px;
  cursor:pointer;
  font-size:.75rem;
  color:var(--text-muted);
  font-family:'JetBrains Mono',monospace;
  transition: all .2s;
  width:calc(100% - 2rem);
  justify-content:center;
}
.theme-toggle:hover {
  background:var(--bg-hover);
  color:var(--accent);
}
.theme-toggle .icon { font-size: 1rem; }

/* Search */
.search-box {
  margin:.5rem 1rem 1rem;
  position:relative;
}
.search-input {
  width:100%;
  padding:.5rem .7rem;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  font-size:.85rem;
  outline:none;
}
.search-input:focus {
  border-color:var(--accent);
  background:var(--bg-surface);
}
.search-input::placeholder { color:var(--text-subtle); }
.search-results {
  display:none;
  position:absolute;
  top:calc(100% + 4px);
  left:0; right:0;
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:6px;
  max-height:320px;
  overflow-y:auto;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
  z-index:150;
}
.search-results.open { display:block; }
.search-result {
  padding:.45rem .7rem;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  font-size:.82rem;
  transition:background .15s;
}
.search-result:last-child { border-bottom:none; }
.search-result:hover { background:var(--bg-hover); color:var(--accent); }
.search-result .path {
  font-size:.7rem;
  color:var(--text-subtle);
  display:block;
  margin-top:.15rem;
  font-family:'JetBrains Mono',monospace;
}
.search-empty {
  padding:.8rem;
  text-align:center;
  color:var(--text-subtle);
  font-size:.8rem;
}

.nav-section {
  padding:.8rem 1.2rem .25rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.68rem;
  color:var(--text-subtle);
  text-transform:uppercase;
  letter-spacing:.12em;
}
.nav-link {
  display:block;
  padding:.3rem 1.2rem .3rem 1.5rem;
  color:var(--text-muted);
  text-decoration:none;
  font-size:.86rem;
  transition:all .15s;
  border-left:2px solid transparent;
}
.nav-link:hover {
  color:var(--text);
  background:var(--accent-soft);
  border-left-color:var(--accent);
}
.nav-link.active {
  color:var(--accent);
  background:var(--accent-soft);
  border-left-color:var(--accent);
  font-weight:500;
}
.nav-link.sub { padding-left:2.3rem; font-size:.8rem; }
.nav-link.sub-sub { padding-left:3rem; font-size:.78rem; color:var(--text-subtle); }

.nav-book { border-bottom:1px solid var(--border); }
.nav-book summary {
  padding:.55rem 1.2rem .4rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:.1em;
  cursor:pointer;
  list-style:none;
  display:flex;
  align-items:center;
  gap:.4rem;
  user-select:none;
  font-weight:600;
}
.nav-book summary::-webkit-details-marker { display:none; }
.nav-book summary::before {
  content:'▸';
  font-size:.7rem;
  color:var(--text-subtle);
  transition:transform .2s;
  display:inline-block;
}
.nav-book[open] summary::before {
  transform:rotate(90deg);
  color:var(--accent);
}
.nav-book summary:hover { color:var(--accent); }
.nav-book .nav-children { padding-bottom:.3rem; }

.nav-part {
  padding:.3rem 1.2rem .2rem 1.5rem;
  font-size:.75rem;
  font-weight:600;
  color:var(--gold);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.03em;
}

/* ── Mobile toggle ── */
.menu-toggle {
  display:none;
  position:fixed;
  top:.8rem; left:.8rem;
  z-index:200;
  background:var(--bg-surface);
  border:1px solid var(--border);
  color:var(--accent);
  font-size:1.3rem;
  padding:.4rem .65rem;
  cursor:pointer;
  border-radius:6px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* ── Main ── */
.main {
  margin-left:280px;
  min-height:100vh;
  transition: margin-left .3s;
}
.topbar {
  background:var(--bg-surface);
  backdrop-filter: blur(8px);
  border-bottom:1px solid var(--border);
  padding:.6rem 2rem;
  display:flex;
  align-items:center;
  gap:1rem;
  position:sticky;
  top:0;
  z-index:50;
}
.breadcrumb {
  font-family:'JetBrains Mono',monospace;
  font-size:.8rem;
  color:var(--text-subtle);
  flex:1;
}
.breadcrumb a { color:var(--gold); text-decoration:none; }
.breadcrumb a:hover { color:var(--accent); }

.comment-btn {
  padding:.35rem .7rem;
  background:var(--accent-soft);
  border:1px solid var(--accent-border);
  color:var(--accent);
  border-radius:5px;
  font-size:.78rem;
  font-family:'JetBrains Mono',monospace;
  cursor:pointer;
  text-decoration:none;
  transition:all .2s;
}
.comment-btn:hover {
  background:var(--accent);
  color:#fff;
}

.content-area {
  max-width:1000px;
  padding:2rem 2.5rem 4rem;
}

/* ── Markdown Rendered Styles ── */
.content-area h1 {
  font-size:2rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:.8rem;
  padding-bottom:.5rem;
  border-bottom:2px solid var(--accent);
}
.content-area h2 {
  font-size:1.4rem;
  font-weight:700;
  color:var(--accent);
  margin-top:2rem;
  margin-bottom:.6rem;
  padding-bottom:.3rem;
  border-bottom:1px solid var(--accent-border);
}
.content-area h3 {
  font-size:1.15rem;
  color:var(--gold);
  margin-top:1.5rem;
  margin-bottom:.4rem;
  font-weight:700;
}
.content-area h4 {
  font-size:1rem;
  color:var(--text);
  margin-top:1.2rem;
  margin-bottom:.4rem;
  font-weight:700;
}
.content-area p { margin-bottom:.85rem; }
.content-area a {
  color:var(--accent);
  text-decoration:none;
  border-bottom:1px solid var(--accent-border);
}
.content-area a:hover { color:var(--gold); border-bottom-color:var(--gold); }
.content-area strong { color:var(--text); font-weight:700; }
.content-area em { color:var(--text-muted); }
.content-area blockquote {
  border-left:3px solid var(--gold);
  padding:.8rem 1rem;
  margin:.9rem 0;
  background:var(--blockquote-bg);
  color:var(--text-muted);
  border-radius: 0 4px 4px 0;
}
.content-area blockquote strong { color:var(--text); }
.content-area ul, .content-area ol { padding-left:1.5rem; margin-bottom:.85rem; }
.content-area li { margin-bottom:.3rem; }
.content-area code {
  font-family:'JetBrains Mono',monospace;
  font-size:.88em;
  background:var(--code-bg);
  padding:.15em .4em;
  border-radius:3px;
  color:var(--gold);
}
.content-area pre {
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:6px;
  padding:1rem;
  overflow-x:auto;
  margin:.9rem 0;
}
.content-area pre code {
  background:none;
  padding:0;
  font-size:.85rem;
  color:var(--text);
}
.content-area .table-wrap {
  overflow-x:auto;
  margin:.9rem 0;
  border-radius:6px;
}
.content-area table {
  border-collapse:collapse;
  font-size:.9rem;
  width:max-content;
  min-width:100%;
}
.content-area td, .content-area th { word-break:keep-all; }
.content-area th {
  background:var(--bg-elevated);
  color:var(--gold);
  font-weight:700;
  padding:.5rem .7rem;
  text-align:left;
  border:1px solid var(--border);
}
.content-area td {
  padding:.5rem .7rem;
  border:1px solid var(--border);
}
.content-area tr:hover td { background:var(--accent-soft); }
.content-area hr {
  border:none;
  border-top:1px solid var(--border);
  margin:1.5rem 0;
}
.content-area img {
  max-width:100%;
  border-radius:6px;
  display:block;
  margin:1rem auto;
}

/* ── Hero (home page) ── */
.hero {
  background: linear-gradient(135deg, var(--accent-soft), var(--gold-soft));
  border-radius: 12px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  text-align:center;
  border: 1px solid var(--accent-border);
}
.hero h1 {
  border:none;
  font-size:2.2rem;
  padding-bottom:0;
  margin-bottom:.5rem;
}
.hero .subtitle {
  font-family:'JetBrains Mono',monospace;
  font-size:.9rem;
  color:var(--text-muted);
  margin-top:.3rem;
}

/* ── Footer ── */
.footer {
  text-align:center;
  padding:1.5rem;
  color:var(--text-subtle);
  font-family:'JetBrains Mono',monospace;
  font-size:.75rem;
  border-top:1px solid var(--border);
  margin-left:280px;
  transition: margin-left .3s;
}
.footer a { color:var(--gold); text-decoration:none; }
.footer a:hover { color:var(--accent); }

/* ── Loading & Not Found ── */
.loading { text-align:center; padding:4rem 2rem; color:var(--text-subtle); }
.loading::after {
  content:'';
  display:inline-block;
  width:20px; height:20px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-left:.5rem;
  vertical-align:middle;
}
@keyframes spin { to { transform:rotate(360deg); } }
.not-found { text-align:center; padding:4rem 2rem; }
.not-found h2 { color:var(--accent); margin-bottom:1rem; }

/* ── Comment Modal ── */
.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background: rgba(0,0,0,.5);
  z-index:300;
  align-items:center;
  justify-content:center;
  padding:1rem;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:10px;
  max-width:500px;
  width:100%;
  padding:1.5rem;
  box-shadow: 0 10px 40px rgba(0,0,0,.2);
}
.modal h3 {
  color:var(--accent);
  margin-bottom:.5rem;
  font-size:1.1rem;
}
.modal p {
  font-size:.85rem;
  color:var(--text-muted);
  margin-bottom:1rem;
}
.modal textarea {
  width:100%;
  min-height:120px;
  padding:.7rem;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family: inherit;
  font-size:.9rem;
  resize:vertical;
  outline:none;
}
.modal textarea:focus { border-color:var(--accent); }
.modal-actions {
  display:flex;
  gap:.5rem;
  justify-content:flex-end;
  margin-top:1rem;
}
.btn {
  padding:.45rem .9rem;
  border-radius:5px;
  font-size:.85rem;
  cursor:pointer;
  border:1px solid var(--border);
  background:var(--bg-elevated);
  color:var(--text);
  font-family:inherit;
  transition:all .2s;
}
.btn:hover { background:var(--bg-hover); }
.btn.primary {
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}
.btn.primary:hover { background:var(--gold); border-color:var(--gold); }

/* ── Responsive ── */
@media(max-width:900px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.15); }
  .menu-toggle { display:block; }
  .main { margin-left:0; }
  .footer { margin-left:0; }
  .topbar { padding-left:3.5rem; }
  .content-area { padding:1.5rem 1.2rem 3rem; }
  .hero { padding:1.5rem 1rem; }
  .hero h1 { font-size:1.7rem; }
}

@media(max-width:500px) {
  .content-area h1 { font-size:1.5rem; }
  .content-area h2 { font-size:1.2rem; }
  .content-area h3 { font-size:1.05rem; }
}

/* ── Selection & Scrollbar ── */
::selection { background:var(--accent-soft); color:var(--accent); }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-strong); }

/* Print */
@media print {
  .sidebar, .topbar, .menu-toggle, .footer { display:none; }
  .main { margin-left:0; }
  .content-area { max-width:none; padding:0; }
}
</style>
</head>
<body>

<!-- Mobile menu toggle -->
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')" aria-label="메뉴">☰</button>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title" onclick="navigateTo('home')">
      <span class="brackets">[</span>FEWK<span class="brackets">]</span> LOREBOOK
    </div>
    <div class="sidebar-subtitle">동방의 하얀 나라 · 제3판 샘플</div>
  </div>

  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="테마 전환">
    <span class="icon" id="themeIcon">🌙</span>
    <span id="themeLabel">다크 모드</span>
  </button>

  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="검색 (제목·용어)" aria-label="검색">
    <div class="search-results" id="searchResults"></div>
  </div>

  <a class="nav-link" href="#home" data-page="home" style="border-top:1px solid var(--border);padding-top:.6rem;padding-bottom:.5rem;font-weight:500;color:var(--accent)">FEWK 소개·홈</a>
  <a class="nav-link" href="#roadmap" data-page="roadmap" style="font-size:.82rem;">로드맵</a>
  <a class="nav-link" href="#license" data-page="license" style="font-size:.82rem;border-bottom:1px solid var(--border);padding-bottom:.5rem;margin-bottom:.3rem;">라이선스 (FWOL)</a>

  <!-- Navigation generated by JS -->
  <div id="navMenu"></div>

</nav>

<!-- Main content -->
<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">
      <a href="#home">FEWK</a>
    </div>
    <button class="comment-btn" onclick="openCommentModal()" title="편집자에게 한마디">💬 댓글</button>

  <div class="content-area" id="content">
    <div class="loading">로딩 중</div>
  </div>
</div>

<footer class="footer">
  FEWK LOREBOOK 제3판 샘플 &mdash;

  &copy; 2021–2026 Kim Dongeun. 생산 기술 &copy; MEJE Works Corp.
</footer>

<!-- Comment Modal -->
<div class="modal-overlay" id="commentModal" onclick="if(event.target===this)closeCommentModal()">
  <div class="modal">
    <h3>편집자에게 한마디</h3>
    <p>이 페이지를 읽으신 소감·오탈자·의견을 편집자에게 보내실 수 있습니다. "보내기"를 누르시면 기본 메일 앱이 열립니다.</p>
    <textarea id="commentText" placeholder="여기에 남기실 내용을 적어주세요..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeCommentModal()">취소</button>
      <button class="btn primary" onclick="sendComment()">보내기</button>
    </div>
  </div>
</div>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
/* ═══════════════════════════════════════════════
   FEWK LOREBOOK 3rd — Runtime
   ═══════════════════════════════════════════════ */

// ── Navigation structure ──
const NAV = {
  corerulebook: {
    label: '코어 룰북 (Core Rulebook)',
    prefix: 'corerulebook',
    parts: [
      { dir: '00_서문', label: '00 서문', items: [
        { f: 'README', t: '목차' },
        { f: '01_이_책에_대하여', t: '이 책에 대하여' },
        { f: '02_TRPG란_무엇인가', t: 'TRPG란 무엇인가' },
        { f: '03_FEWK_3판_읽는_법', t: 'FEWK 3판 읽는 법' },

// ── Build navigation menu ──
function buildNav() {
  const menu = document.getElementById('navMenu');
  let html = '';

  for (const bookKey of Object.keys(NAV)) {
    const book = NAV[bookKey];
    html += `<details class="nav-book"${bookKey === 'corerulebook' ? ' open' : ''}>`;
    html += `<summary>${book.label}</summary>`;
    html += `<div class="nav-children">`;

    for (const part of book.parts) {
      if (part.items.length > 0) {
        html += `<div class="nav-part">${part.label}</div>`;
        for (const item of part.items) {
          const page = `${book.prefix}/${part.dir}/${item.f}`;
          html += `<a class="nav-link sub" href="#${page}" data-page="${page}">${item.t}</a>`;
        }
      } else {
        // World Book: 파트 단위로만 링크 (동적으로 각 파트 README 호출)
        const page = `${book.prefix}/${part.dir}/README`;
        html += `<a class="nav-link sub" href="#${page}" data-page="${page}">${part.label}</a>`;
      }
    }

    html += `</div></details>`;
  }

  menu.innerHTML = html;
}

// ── Theme ──
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('fewk-theme', theme);
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (theme === 'dark') {
    icon.textContent = '☀️';
    label.textContent = '라이트 모드';
  } else {
    icon.textContent = '🌙';
    label.textContent = '다크 모드';
  }
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'light' ? 'dark' : 'light');
}
// Initial
(function() {
  const saved = localStorage.getItem('fewk-theme');
  const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved || (prefers ? 'dark' : 'light'));
})();

// ── Markdown rendering ──
function convertWikilinks(md) {
  md = md.replace(/\[\[([^\]]*?)\]\]/g, function(m) { return m.replace(/\\\|/g, '|'); });
  md = md.replace(/\[\[([^|\]]+)\|([^\]]+)\]\]/g, function(_, p, t) { return '[' + t.trim() + '](#' + p.trim() + ')'; });
  md = md.replace(/\[\[([^\]]+)\]\]/g, function(_, p) { return '[' + p.trim() + '](#' + p.trim() + ')'; });
  return md;
}

// 상대 경로 `.md` 링크를 해시 라우팅으로 변환
function rewriteLinks(containerEl, currentPage) {
  const curParts = currentPage.split('/');
  curParts.pop(); // 현재 파일 제외, 폴더 남김
  const curDir = curParts.join('/');

  containerEl.querySelectorAll('a').forEach(function(a) {
    const href = a.getAttribute('href');
    if (!href) return;

    // 외부 링크 유지
    if (/^(https?:|mailto:)/.test(href)) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener');
      return;
    }

    // 이미 해시 링크
    if (href.startsWith('#')) {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        navigateTo(href.substring(1));
      });
      return;
    }

    // 상대 경로 .md 링크 → 해시 라우팅
    if (href.endsWith('.md') || href.includes('.md#') || /\.\.\//.test(href)) {
      // 원본 Core Rulebook·World Book 참조 링크는 무시 (로컬 파일 없음)
      // 대신 코어룰북 내부 링크만 처리
      let resolved = href.replace(/^\.\//, '');
      // 부모 디렉토리 처리
      let parts = curDir.split('/').filter(Boolean);
      const target = resolved.split('/');
      for (let i = 0; i < target.length; i++) {
        if (target[i] === '..') parts.pop();
        else if (target[i] === '.') continue;
        else parts.push(target[i]);
      }
      // 외부 책 링크(Core Rulebook 외부) 처리
      if (parts[0] !== 'corerulebook' && parts[0] !== 'worldbook') {
        // World Book 외부 참조 등 — 해당 파일이 변환된 위치 추정
        // 예: ../../[3판%20FEWK%20World%20Book]/... → worldbook/...
        const full = parts.join('/');
        const wbMatch = full.match(/\[3판\s*FEWK\s*World\s*Book\]\/(.+)/);
        if (wbMatch) {
          parts = ['worldbook'].concat(wbMatch[1].split('/'));
        } else {
          // 링크 변환 불가 — 클릭 비활성화
          a.style.opacity = '0.6';
          a.style.cursor = 'not-allowed';
          a.addEventListener('click', function(e) { e.preventDefault(); });
          return;
        }
      }
      let page = parts.join('/').replace(/\.md$/, '');
      // 폴더만 가리키면 README 추가
      if (page.endsWith('/')) page += 'README';

      a.setAttribute('href', '#' + page);
      a.addEventListener('click', function(e) {
        e.preventDefault();
        navigateTo(page);
      });
    }
  });
}

// ── Load and render a page ──
async function loadPage(page) {
  const content = document.getElementById('content');
  const breadcrumb = document.getElementById('breadcrumb');
  content.innerHTML = '<div class="loading">로딩 중</div>';

  // 하드코딩된 최상위 페이지 (home, roadmap, license)
  const TOP_PAGES = {
    'home': 'content/home.md',
    'roadmap': 'content/roadmap.md',
    'license': 'content/license.md'
  };

  let url;
  if (TOP_PAGES[page]) {
    url = TOP_PAGES[page];
  } else {
    url = 'content/' + page + '.md';
  }

  // Breadcrumb
  const parts = page.split('/');
  let bc = '<a href="#home">FEWK</a>';
  if (page === 'home') bc += ' / 홈';
  else if (page === 'roadmap') bc += ' / 로드맵';
  else if (page === 'license') bc += ' / 라이선스';
  else if (parts[0] === 'corerulebook') bc += ' / 코어 룰북';
  else if (parts[0] === 'worldbook') bc += ' / 월드 북';
  if (parts.length > 1) bc += ' / ' + parts[parts.length - 1].replace(/^\d+_/, '').replace(/_/g, ' ');
  breadcrumb.innerHTML = bc;

  // Highlight active nav
  document.querySelectorAll('.nav-link').forEach(function(el) {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.querySelectorAll('.nav-book').forEach(function(det) {
    const hasActive = det.querySelector('.nav-link.active');
    if (hasActive) det.open = true;
  });

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    let md = await res.text();
    md = convertWikilinks(md);
    content.innerHTML = marked.parse(md);

    // Wrap tables
    content.querySelectorAll('table').forEach(function(t) {
      const w = document.createElement('div');
      w.className = 'table-wrap';
      t.parentNode.insertBefore(w, t);
      w.appendChild(t);
    });

    // Rewrite internal links
    rewriteLinks(content, page);

    window.scrollTo(0, 0);
  } catch (e) {
    content.innerHTML =
      '<div class="not-found">' +
      '<h2>페이지를 찾을 수 없습니다</h2>' +
      '<p>' + page + '</p>' +
      '<p><a href="#home">홈으로 돌아가기</a></p>' +
      '</div>';
  }

  document.querySelector('.sidebar').classList.remove('open');
}

function navigateTo(page) { window.location.hash = page; }

// ── Search (client-side simple text match) ──
// 데이터 구조: 모든 NAV 항목 평탄화
const SEARCH_INDEX = [];
function buildSearchIndex() {
  // 최상위
  SEARCH_INDEX.push({ t: 'FEWK 소개·홈', p: 'home' });
  SEARCH_INDEX.push({ t: '로드맵', p: 'roadmap' });
  SEARCH_INDEX.push({ t: '라이선스 FWOL', p: 'license' });

  for (const bookKey of Object.keys(NAV)) {
    const book = NAV[bookKey];
    for (const part of book.parts) {
      SEARCH_INDEX.push({ t: book.label + ' ' + part.label, p: book.prefix + '/' + part.dir + '/README', part: part.label });
      for (const item of part.items) {
        SEARCH_INDEX.push({
          t: item.t,
          p: book.prefix + '/' + part.dir + '/' + item.f,
          part: part.label,
          book: book.label
        });
      }
    }
  }
}
buildSearchIndex();

function runSearch(q) {
  const results = document.getElementById('searchResults');
  q = q.trim().toLowerCase();
  if (!q) { results.classList.remove('open'); return; }

  const matches = SEARCH_INDEX.filter(function(item) {
    return item.t.toLowerCase().includes(q) || (item.part && item.part.toLowerCase().includes(q));
  }).slice(0, 20);

  if (matches.length === 0) {
    results.innerHTML = '<div class="search-empty">결과 없음</div>';
  } else {
    results.innerHTML = matches.map(function(m) {
      return '<div class="search-result" data-page="' + m.p + '">' +
        m.t +
        (m.book ? '<span class="path">' + m.book + ' · ' + m.part + '</span>' : '') +
        '</div>';
    }).join('');
    results.querySelectorAll('.search-result').forEach(function(el) {
      el.addEventListener('click', function() {
        navigateTo(el.dataset.page);
        document.getElementById('searchInput').value = '';
        results.classList.remove('open');
      });
    });
  }
  results.classList.add('open');
}

// ── Comment Modal (mailto) ──
function openCommentModal() {
  document.getElementById('commentModal').classList.add('open');
  setTimeout(function() { document.getElementById('commentText').focus(); }, 100);
}
function closeCommentModal() {
  document.getElementById('commentModal').classList.remove('open');
  document.getElementById('commentText').value = '';
}
function sendComment() {
  const text = document.getElementById('commentText').value.trim();
  if (!text) { alert('내용을 입력해주세요.'); return; }
  const page = window.location.hash.substring(1) || 'home';
  const subject = encodeURIComponent('[FEWK Book 피드백] ' + page);
  const body = encodeURIComponent(
    '[페이지] ' + page + '\n' +
    '[URL] ' + window.location.href + '\n' +
    '[시각] ' + new Date().toISOString() + '\n\n' +
    '----- 의견 -----\n' +
    text + '\n\n' +
    '-- FEWK 룰북 샘플 피드백 --'
  );
  window.location.href = 'mailto:whtdrgon@gmail.com?subject=' + subject + '&body=' + body;
  closeCommentModal();
}

// ── Hash routing ──
window.addEventListener('hashchange', function() {
  const page = window.location.hash.substring(1) || 'home';
  loadPage(page);
});

// ── Init ──
(function init() {
  buildNav();

  // Search listeners
  const si = document.getElementById('searchInput');
  si.addEventListener('input', function() { runSearch(this.value); });
  si.addEventListener('focus', function() { if (this.value) runSearch(this.value); });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-box')) {
      document.getElementById('searchResults').classList.remove('open');
    }
  });

  // Escape closes modal
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeCommentModal();
  });

  // Initial load
  const page = window.location.hash.substring(1) || 'home';
  loadPage(page);
})();
</script>
